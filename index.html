<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM Test – Add to Cart</title>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-W7LP39P');</script>
  <!-- End Google Tag Manager -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a56db;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .product-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: left;
    }

    .product-box .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .product-box .item-name {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .product-box .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 8px;
    }

    .product-box .price {
      font-size: 22px;
      font-weight: 700;
      color: #1a56db;
    }

    .product-box .miles {
      font-size: 13px;
      color: #6b7280;
    }

    .product-box .coupon {
      margin-top: 8px;
      font-size: 12px;
      color: #059669;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      background: #1a56db;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .btn:hover  { background: #1648c0; }
    .btn:active { transform: scale(.98); }

    .log-section {
      margin-top: 28px;
      text-align: left;
    }

    .log-section .log-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    #event-log {
      background: #111827;
      color: #6ee7b7;
      font-family: "Courier New", monospace;
      font-size: 12px;
      border-radius: 8px;
      padding: 16px;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }

    #event-log.visible { display: block; }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      margin-right: 6px;
      vertical-align: middle;
      transition: background .3s;
    }

    .status-dot.fired { background: #10b981; }

    .status-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W7LP39P"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="card">
    <span class="badge">GTM Test</span>
    <h1>ConnectMiles – Buy Miles</h1>
    <p class="subtitle">Presiona el botón para disparar el evento <code>add_to_cart</code> en el dataLayer.</p>

    <div class="product-box">
      <div class="label">Producto</div>
      <div class="item-name">Buy Miles</div>
      <div class="price-row">
        <span class="price">$78 USD</span>
        <span class="miles">· 3,000 ConnectMiles</span>
      </div>
      <div class="coupon">Cupón aplicado: BMC002 (descuento $8.10)</div>
    </div>

    <button class="btn" id="addToCartBtn" onclick="fireAddToCart()">
      Agregar al carrito
    </button>

    <div class="status-text">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Esperando evento…</span>
    </div>

    <div class="log-section">
      <div class="log-title">dataLayer push</div>
      <pre id="event-log"></pre>
    </div>
  </div>

  <script>
    window.dataLayer = window.dataLayer || [];

    function fireAddToCart() {
      var payload = {
        event: "add_to_cart",
        ecommerce: {
          currency: "USD",
          value: 78,
          custom_local_value: 78,
          custom_connectmiles_amount: 3000,
          coupon: "BMC002",
          items: [
            {
              item_id: "buy_miles",
              item_name: "Buy Miles",
              price: 78,
              quantity: 1,
              index: 0,
              item_brand: "ConnectMiles",
              discount: 8.099999999999994
            }
          ]
        }
      };

      dataLayer.push(payload);

      var dot  = document.getElementById("statusDot");
      var text = document.getElementById("statusText");
      var log  = document.getElementById("event-log");

      dot.classList.add("fired");
      text.textContent = "Evento disparado ✓ (" + new Date().toLocaleTimeString() + ")";

      log.textContent = JSON.stringify(payload, null, 2);
      log.classList.add("visible");

      console.log("[GTM Test] dataLayer.push →", payload);
    }
  </script>

</body>
</html>
